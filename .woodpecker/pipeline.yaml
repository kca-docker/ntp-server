variables:
  - &arch linux/amd64,linux/i386,linux/arm/v7,linux/arm64/v8

steps:
  # Check Dockerfile for security smells and best practices
  lint:
    when:
      event: [push, deployment, cron, manual]
      branch: main
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint Dockerfile

  # Build the image (dry-run to test build process)
  build-test:
    when:
      event: [push, deployment, cron, manual]
      branch: main
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: *arch
      repo: ntp-server
      tags: latest
      dry_run: true
      # Deaktiviere Metadaten, die das Archiv-Layout verändern
      provenance: false
      sbom: false
      # Exportiert das Image als lokale Datei statt es zu pushen
      output: type=oci,dest=ntp-server.tar,oci-mediatypes=false

  # Scan image for vulnerabilities (BSI/NIST compliance)
  security-scan:
    when:
      event: [push, deployment, cron, manual]
      branch: main
    image: aquasec/trivy:latest
    environment:
      DOCKER_HOST: "tcp://10.89.0.69:2375"
    commands:
      - trivy image --exit-code 1 --severity HIGH,CRITICAL --input ntp-server.tar

  # Final step: Publish if all checks passed
  publish:
    when:
      event: [push, deployment, cron, manual]
      branch: main
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: *arch
      sbom: true
      repo: bksolutions/ntp-server
      tags: [latest, "${CI_COMMIT_SHA:0:7}"]
      username:
        from_secret: DOCKER_BKSOL_USER
      password:
        from_secret: DOCKER_BKSOL_PASS
