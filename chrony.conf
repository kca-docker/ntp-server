# Use public NTP pool servers (German pool for low latency)
server 0.de.pool.ntp.org iburst
server 1.de.pool.ntp.org iburst

# Record the rate at which the system clock gains/losses time
driftfile /var/lib/chrony/chrony.drift

# Stop chrony from trying to control the system clock (not possible in unprivileged containers)
# The container provides time to others, it doesn't set the host's time
proc_systime 0
nosystemclock

# Allow NTP clients from local networks (adjust to your needs)
allow 10.0.0.0/8
allow 172.16.0.0/12
allow 192.168.0.0/16

# Log only basic information
logchange 0.5
